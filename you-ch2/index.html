<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>유튜브 대본 다운로더</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a1a;
    --muted: #666;
    --border: #d0d0d0;
    --primary: #c4302b;
    --primary-fg: #ffffff;
    --card: #f7f7f7;
    --error: #c0392b;
    --success: #27ae60;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a;
      --fg: #e8e8e8;
      --muted: #999;
      --border: #444;
      --primary: #e74c3c;
      --card: #2a2a2a;
      --error: #ff6b6b;
      --success: #4ade80;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 16px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
    font-size: 16px; line-height: 1.5;
    background: var(--bg); color: var(--fg);
  }
  h1 { font-size: 20px; margin: 0 0 16px 0; }
  .input-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .input-wrap { position: relative; flex: 1; }
  #url {
    width: 100%; padding: 10px 32px 10px 12px;
    font-size: 15px; border: 1px solid var(--border);
    border-radius: 6px; background: var(--bg); color: var(--fg);
  }
  #clear {
    position: absolute; right: 6px; top: 50%;
    transform: translateY(-50%);
    width: 24px; height: 24px;
    border: none; background: var(--border); color: var(--fg);
    border-radius: 50%; cursor: pointer;
    font-size: 14px; line-height: 1; display: none;
  }
  #clear.visible { display: block; }
  button {
    padding: 10px 16px; font-size: 15px;
    border: none; border-radius: 6px;
    cursor: pointer; font-family: inherit;
  }
  #run {
    background: var(--primary); color: var(--primary-fg);
    font-weight: 600; white-space: nowrap;
  }
  #run:disabled { opacity: 0.5; cursor: not-allowed; }
  .status {
    margin: 12px 0; min-height: 24px;
    display: flex; align-items: center; gap: 8px;
    color: var(--muted);
  }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { color: var(--error); }
  .result {
    margin-top: 12px; padding: 12px;
    background: var(--card); border-radius: 6px;
    display: none;
  }
  .result.visible { display: block; }
  .meta { font-size: 13px; color: var(--muted); margin-bottom: 10px; }
  .meta .kind-manual { color: var(--success); font-weight: 600; }
  .meta .kind-auto { color: var(--muted); }
  .preview {
    padding: 10px; background: var(--bg);
    border: 1px solid var(--border); border-radius: 4px;
    margin-bottom: 12px; font-size: 14px;
  }
  .buttons { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
  .buttons button {
    background: var(--bg); color: var(--fg);
    border: 1px solid var(--border);
    font-size: 14px; padding: 8px 12px;
  }
  .buttons button.primary {
    background: var(--primary); color: var(--primary-fg);
    border-color: var(--primary);
  }
  .full-text {
    display: none; margin-top: 8px; padding: 10px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 4px; max-height: 400px; overflow-y: auto;
    white-space: pre-wrap; word-break: break-word;
    font-family: ui-monospace, "SF Mono", Consolas, monospace;
    font-size: 13px; line-height: 1.6;
    user-select: text; -webkit-user-select: text;
  }
  .full-text.visible { display: block; }
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%);
    padding: 10px 20px;
    background: rgba(0,0,0,0.85); color: #fff;
    border-radius: 20px; font-size: 14px;
    opacity: 0; transition: opacity 0.2s;
    pointer-events: none; z-index: 1000;
  }
  .toast.visible { opacity: 1; }
</style>
</head>
<body>

<h1>유튜브 대본 다운로더</h1>
<div style="margin-bottom: 16px;">
  <a href="/channel" style="color: var(--primary); font-size: 14px;">→ 채널 일괄 다운로드</a>
</div>

<div class="input-row">
  <div class="input-wrap">
    <input id="url" type="text" placeholder="유튜브 URL 붙여넣기" autocomplete="off">
    <button id="clear" type="button" aria-label="입력 지우기">✕</button>
  </div>
  <button id="run" type="button">실행</button>
</div>

<div id="status" class="status"></div>

<div id="result" class="result">
  <div id="meta" class="meta"></div>
  <div id="preview" class="preview"></div>
  <div class="buttons">
    <button id="toggle" type="button">전체 보기</button>
    <button id="copy" type="button">전체 복사</button>
    <button id="download" type="button" class="primary">TXT 다운로드</button>
  </div>
  <div id="fullText" class="full-text"></div>
</div>

<div id="toast" class="toast"></div>

<script>
  const $url = document.getElementById('url');
  const $clear = document.getElementById('clear');
  const $run = document.getElementById('run');
  const $status = document.getElementById('status');
  const $result = document.getElementById('result');
  const $meta = document.getElementById('meta');
  const $preview = document.getElementById('preview');
  const $toggle = document.getElementById('toggle');
  const $copy = document.getElementById('copy');
  const $download = document.getElementById('download');
  const $fullText = document.getElementById('fullText');
  const $toast = document.getElementById('toast');

  let currentData = null;

  $url.addEventListener('input', () => {
    $clear.classList.toggle('visible', $url.value.length > 0);
  });
  $clear.addEventListener('click', () => {
    $url.value = '';
    $clear.classList.remove('visible');
    $url.focus();
  });
  $url.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); runFetch(); }
  });
  $run.addEventListener('click', runFetch);

  async function runFetch() {
    const url = $url.value.trim();
    if (!url) { showStatus('URL을 입력해주세요.', 'error'); return; }

    $result.classList.remove('visible');
    $fullText.classList.remove('visible');
    $toggle.textContent = '전체 보기';
    $run.disabled = true;
    showStatus('<span class="spinner"></span> 처리 중...', '');

    try {
      const resp = await fetch('/api/transcript', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url }),
      });
      const data = await resp.json();
      if (!data.ok) { showStatus(data.error || '오류가 발생했습니다.', 'error'); return; }
      currentData = data;
      showResult(data);
      showStatus('완료', '');
    } catch (e) {
      showStatus('서버와 통신할 수 없습니다: ' + e.message, 'error');
    } finally {
      $run.disabled = false;
    }
  }

  function showStatus(html, type) {
    $status.innerHTML = html;
    $status.className = 'status' + (type === 'error' ? ' error' : '');
  }

  function showResult(data) {
    const kindLabel = data.kind === 'manual'
      ? '<span class="kind-manual">수동 자막</span>'
      : '<span class="kind-auto">자동 자막</span>';
    const titlePart = data.title ? `<div><strong>${escapeHtml(data.title)}</strong></div>` : '';
    $meta.innerHTML = titlePart +
      `<div>${kindLabel} · ${data.line_count}줄 · 파일명: ${escapeHtml(data.filename)}</div>`;
    $preview.textContent = data.preview;
    $fullText.textContent = data.full_text;
    $result.classList.add('visible');
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }

  $toggle.addEventListener('click', () => {
    const isVisible = $fullText.classList.toggle('visible');
    $toggle.textContent = isVisible ? '전체 숨기기' : '전체 보기';
  });

  $copy.addEventListener('click', async () => {
    if (!currentData) return;
    const text = currentData.full_text;
    let ok = false;
    if (navigator.clipboard && window.isSecureContext !== false) {
      try { await navigator.clipboard.writeText(text); ok = true; } catch (e) { ok = false; }
    }
    if (!ok) {
      try {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.top = '-1000px';
        document.body.appendChild(ta);
        ta.focus(); ta.select();
        ok = document.execCommand('copy');
        document.body.removeChild(ta);
      } catch (e) { ok = false; }
    }
    showToast(ok ? '복사되었습니다' : '복사 실패. 본문을 길게 눌러 직접 복사해주세요.');
  });

  $download.addEventListener('click', () => {
    if (!currentData) return;
    const bom = '\uFEFF';
    const blob = new Blob([bom + currentData.full_text], { type: 'text/plain;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = currentData.filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
    showToast('다운로드를 시작했습니다');
  });

  let toastTimer = null;
  function showToast(msg) {
    $toast.textContent = msg;
    $toast.classList.add('visible');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => $toast.classList.remove('visible'), 1800);
  }
</script>
</body>
</html>
