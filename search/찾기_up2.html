<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube 다중 채널 키워드 검색</title>
<style>
  body { font-family: "Apple SD Gothic Neo", "맑은 고딕", sans-serif;
         max-width: 860px; margin: 20px auto; padding: 0 14px; color:#eee;
         background:#1a1a1a; }
  h1 { font-size: 1.2em; }
  label { display:block; margin-top:10px; font-weight:bold; font-size:0.95em; }
  input[type=text], input[type=date], select {
    padding:10px; font-size:1em; box-sizing:border-box;
    font-family:inherit; background:#2a2a2a; color:#eee; border:1px solid #444;
    border-radius:4px;
  }
  input[type=text] { width:100%; }
  input[type=date] { width:48%; }
  select { width:100%; margin-top:4px; }
  button { margin-top:10px; padding:10px 18px; font-size:0.95em; cursor:pointer;
           background:#c00; color:white; border:none; border-radius:4px; }
  button.sub { background:#446; }
  button.quick { background:#335; padding:6px 12px; font-size:0.85em; margin:4px 4px 0 0;}
  button.act { background:#357; padding:8px 14px; font-size:0.88em; margin:0 4px 0 0;}
  button:hover { opacity:0.85; }
  .row-flex { display:flex; gap:8px; flex-wrap:wrap; }
  .filebox { background:#222; padding:12px 14px; border-radius:6px; margin-top:12px; }
  .filebox .file-row { display:flex; align-items:center; gap:10px; flex-wrap:wrap;
                       margin-top:6px; }
  .filebox label.fileLbl {
    display:inline-block; padding:6px 12px; background:#446; color:#fff;
    border-radius:4px; cursor:pointer; font-weight:normal; margin:0;
  }
  .filebox input[type=file] { display:none; }
  .status { font-size:0.85em; }
  .ok  { color:#6c6; }
  .err { color:#ff6060; }
  .hint { color:#999; font-size:0.82em; margin-top:4px; }
  .opts { margin-top:8px; font-size:0.9em; }
  .opts label { display:inline-block; font-weight:normal; margin-right:14px; }
  .actions { margin-top:14px; padding:10px; background:#222; border-radius:6px;
             display:none; }
  .actions.show { display:block; }
  #results { margin-top:14px; font-family: Consolas, monospace; line-height:1.7;
             font-size:0.92em; }
  .vrow { padding:6px 0; border-bottom:1px dashed #444; }
  .vrow a { color:#ff7070; text-decoration:none; }
  .vrow .meta { color:#aaa; font-size:0.85em; }
  .vrow .dur { color:#ffd060; }
  .vrow .shorts { color:#7af; font-weight:bold; }
  .info-bar { font-size:0.85em; color:#aaa; margin-top:10px; }
  details { margin-top:12px; }
  summary { cursor:pointer; color:#7af; font-weight:bold; }
  pre.preview { background:#111; padding:8px; border-radius:4px; font-size:0.8em;
                color:#aaa; max-height:120px; overflow:auto; margin:6px 0 0; }
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
           background:#333; color:#fff; padding:10px 18px; border-radius:6px;
           font-size:0.9em; opacity:0; transition:opacity 0.3s; z-index:100; }
  .toast.show { opacity:1; }
</style>
</head>
<body>
  <h1>📺 YouTube 다중 채널 키워드 검색</h1>

  <details id="settings">
    <summary>⚙️ 설정 파일 불러오기 / 초기화</summary>

    <div class="filebox">
      <div><b>secret.txt</b> <span id="secStatus" class="status">— 미로드</span></div>
      <div class="file-row">
        <label class="fileLbl">파일 선택
          <input type="file" id="secretFile" accept=".txt,text/plain">
        </label>
        <span class="hint">파일 안에 API 키 한 줄만 (AIzaSy...)</span>
      </div>
      <pre class="preview" id="secPreview" style="display:none;"></pre>
    </div>

    <div class="filebox">
      <div><b>channels.txt</b> <span id="chStatus" class="status">— 미로드</span></div>
      <div class="file-row">
        <label class="fileLbl">파일 선택
          <input type="file" id="channelFile" accept=".txt,text/plain">
        </label>
        <span class="hint">한 줄에 채널 하나 (@핸들)</span>
      </div>
      <pre class="preview" id="chPreview" style="display:none;"></pre>
    </div>

    <button class="sub" onclick="clearStorage()">저장된 모든 데이터 삭제</button>
  </details>

  <label>키워드</label>
  <input type="text" id="keyword" placeholder="예: 장동혁" />

  <label>검색 히스토리 (최근 10개)</label>
  <select id="history" onchange="loadFromHistory()">
    <option value="">— 선택 시 자동 복원 —</option>
  </select>

  <label>기간</label>
  <div class="row-flex">
    <input type="date" id="dateFrom" />
    <input type="date" id="dateTo" />
  </div>
  <div>
    <button class="quick" onclick="setRange(0)">오늘</button>
    <button class="quick" onclick="setRange(7)">1주</button>
    <button class="quick" onclick="setRange(30)">1개월</button>
    <button class="quick" onclick="setRange(-1)">전체</button>
  </div>

  <div class="opts">
    <label><input type="checkbox" id="excludeShorts"> 쇼츠 제외</label>
    <label>채널당 최대 <input type="text" id="maxPer" value="10" style="width:50px;"> 개</label>
  </div>

  <button onclick="doSearch()">검색</button>

  <div class="actions" id="actions">
    <button class="act" onclick="downloadHTML()">📥 다운로드 (HTML)</button>
    <button class="act" onclick="shareText()">📤 공유 (TXT)</button>
    <button class="act" onclick="copyText()">📋 복사</button>
  </div>

  <div class="info-bar" id="infoBar"></div>
  <div id="results"></div>

  <div class="toast" id="toast"></div>

<script>
const API = "https://www.googleapis.com/youtube/v3";
let API_KEY  = "";
let CHANNELS = [];
let LAST_RESULT = null;

const $ = id => document.getElementById(id);

function toast(msg, ms=2000) {
  const t = $("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), ms);
}

function readFile(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload  = () => resolve(r.result);
    r.onerror = () => reject(r.error);
    r.readAsText(file, "UTF-8");
  });
}

// ─── 날짜 유틸 ───
function fmtDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}
function setRange(days) {
  if (days < 0) { $("dateFrom").value = ""; $("dateTo").value = ""; return; }
  const to = new Date();
  const from = new Date(); from.setDate(from.getDate() - days);
  $("dateFrom").value = fmtDate(from);
  $("dateTo").value   = fmtDate(to);
}

// ─── ISO 8601 duration → 사람이 보기 좋은 문자열 ───
function parseDuration(iso) {
  const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if (!m) return { sec:0, str:"?" };
  const h = parseInt(m[1]||0), mi = parseInt(m[2]||0), s = parseInt(m[3]||0);
  const sec = h*3600 + mi*60 + s;
  let str;
  if (h > 0) str = `${h}:${String(mi).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
  else       str = `${mi}:${String(s).padStart(2,"0")}`;
  return { sec, str };
}

function fmtViews(n) {
  n = parseInt(n);
  if (isNaN(n)) return "?";
  if (n >= 1e6) return (n/1e6).toFixed(1).replace(/\.0$/,"") + "M";
  if (n >= 1e3) return (n/1e3).toFixed(1).replace(/\.0$/,"") + "K";
  return String(n);
}

function decode(s) {
  return s.replace(/&amp;/g,"&").replace(/&quot;/g,'"')
          .replace(/&#39;/g,"'").replace(/&lt;/g,"<").replace(/&gt;/g,">");
}

// ─── 파일 선택 이벤트 ───
$("secretFile").addEventListener("change", async e => {
  const f = e.target.files[0]; if (!f) return;
  try {
    const txt = await readFile(f);
    const key = txt.split(/\r?\n/).map(s=>s.trim()).filter(Boolean)[0] || "";
    if (!key) throw new Error("파일이 비어있습니다.");
    if (key.length < 20) throw new Error("키 형식이 올바르지 않습니다.");
    API_KEY = key;
    localStorage.setItem("yt_api_key", API_KEY);
    $("secStatus").innerHTML = '<span class="ok">✓ 로드 완료</span>';
    $("secPreview").style.display = "block";
    $("secPreview").textContent = "API Key: " + API_KEY.slice(0,8) + "..." + API_KEY.slice(-4);
  } catch (err) {
    $("secStatus").innerHTML = '<span class="err">✗ ' + err.message + '</span>';
  }
});

$("channelFile").addEventListener("change", async e => {
  const f = e.target.files[0]; if (!f) return;
  try {
    const txt = await readFile(f);
    CHANNELS = txt.split(/\r?\n/).map(s => s.trim()).filter(Boolean);
    if (!CHANNELS.length) throw new Error("채널 목록이 비어있습니다.");
    localStorage.setItem("yt_channels", JSON.stringify(CHANNELS));
    $("chStatus").innerHTML = '<span class="ok">✓ ' + CHANNELS.length + '개 채널 로드</span>';
    $("chPreview").style.display = "block";
    $("chPreview").textContent = CHANNELS.join("\n");
  } catch (err) {
    $("chStatus").innerHTML = '<span class="err">✗ ' + err.message + '</span>';
  }
});
// ─── localStorage 복원 ───
function restore() {
  const k = localStorage.getItem("yt_api_key");
  const c = localStorage.getItem("yt_channels");
  if (k) {
    API_KEY = k;
    $("secStatus").innerHTML = '<span class="ok">✓ 저장된 키 사용중</span>';
    $("secPreview").style.display = "block";
    $("secPreview").textContent = "API Key: " + k.slice(0,8) + "..." + k.slice(-4);
  }
  if (c) {
    try {
      CHANNELS = JSON.parse(c);
      $("chStatus").innerHTML = '<span class="ok">✓ 저장된 ' + CHANNELS.length + '개 채널 사용중</span>';
      $("chPreview").style.display = "block";
      $("chPreview").textContent = CHANNELS.join("\n");
    } catch {}
  }
  if (!k || !c) $("settings").open = true;

  // 히스토리 드롭다운 채우기
  rebuildHistoryDropdown();

  // 마지막 검색 결과 복원
  const last = localStorage.getItem("yt_last_result");
  if (last) {
    try {
      LAST_RESULT = JSON.parse(last);
      $("keyword").value = LAST_RESULT.keyword || "";
      $("dateFrom").value = LAST_RESULT.dateFrom || "";
      $("dateTo").value   = LAST_RESULT.dateTo || "";
      $("results").innerHTML = LAST_RESULT.rendered || "";
      $("infoBar").textContent = `↻ 복원된 결과: "${LAST_RESULT.keyword}" (${LAST_RESULT.savedAt || ""})`;
      if (LAST_RESULT.rendered) $("actions").classList.add("show");
    } catch {}
  }
}

function clearStorage() {
  if (!confirm("저장된 API 키, 채널, 히스토리, 마지막 결과를 모두 삭제할까요?")) return;
  localStorage.removeItem("yt_api_key");
  localStorage.removeItem("yt_channels");
  localStorage.removeItem("yt_history");
  localStorage.removeItem("yt_last_result");
  API_KEY = ""; CHANNELS = []; LAST_RESULT = null;
  $("secStatus").innerHTML = "— 미로드";
  $("chStatus").innerHTML = "— 미로드";
  $("secPreview").style.display = "none";
  $("chPreview").style.display = "none";
  $("results").innerHTML = "";
  $("infoBar").textContent = "";
  $("actions").classList.remove("show");
  rebuildHistoryDropdown();
  toast("초기화 완료");
}

// ─── 히스토리 ───
function getHistory() {
  try { return JSON.parse(localStorage.getItem("yt_history") || "[]"); }
  catch { return []; }
}
function pushHistory(entry) {
  let h = getHistory();
  // 같은 키워드+기간 조합은 중복 제거
  h = h.filter(x => !(x.keyword === entry.keyword
                   && x.dateFrom === entry.dateFrom
                   && x.dateTo === entry.dateTo));
  h.unshift(entry);
  if (h.length > 10) h = h.slice(0, 10);
  localStorage.setItem("yt_history", JSON.stringify(h));
  rebuildHistoryDropdown();
}
function rebuildHistoryDropdown() {
  const sel = $("history");
  const h = getHistory();
  sel.innerHTML = '<option value="">— 선택 시 자동 복원 —</option>';
  h.forEach((e, i) => {
    const range = (e.dateFrom || e.dateTo)
      ? ` [${e.dateFrom || "…"} ~ ${e.dateTo || "…"}]`
      : " [전체]";
    const opt = document.createElement("option");
    opt.value = i;
    opt.textContent = `${e.keyword}${range} (${e.savedAt || ""})`;
    sel.appendChild(opt);
  });
}
function loadFromHistory() {
  const i = $("history").value;
  if (i === "") return;
  const e = getHistory()[parseInt(i)];
  if (!e) return;
  $("keyword").value  = e.keyword || "";
  $("dateFrom").value = e.dateFrom || "";
  $("dateTo").value   = e.dateTo || "";
  $("results").innerHTML = e.rendered || "";
  $("infoBar").textContent = `↻ 히스토리에서 복원: "${e.keyword}" (${e.savedAt || ""})`;
  LAST_RESULT = e;
  localStorage.setItem("yt_last_result", JSON.stringify(e));
  if (e.rendered) $("actions").classList.add("show");
  else $("actions").classList.remove("show");
}

// ─── YouTube API ───
async function resolveChannelId(handleOrId) {
  if (/^UC[A-Za-z0-9_-]{22}$/.test(handleOrId)) return handleOrId;
  const handle = handleOrId.replace(/^@/, "");
  const url = `${API}/channels?part=id&forHandle=@${encodeURIComponent(handle)}&key=${API_KEY}`;
  const r = await fetch(url);
  const j = await r.json();
  if (j.error) throw new Error(j.error.message);
  return j.items?.[0]?.id || null;
}

async function searchChannel(channelId, keyword, maxResults, dateFrom, dateTo) {
  let url = `${API}/search?part=snippet&channelId=${channelId}`
          + `&q=${encodeURIComponent(keyword)}&type=video`
          + `&maxResults=${maxResults}&order=date&key=${API_KEY}`;
  if (dateFrom) url += `&publishedAfter=${dateFrom}T00:00:00Z`;
  if (dateTo)   url += `&publishedBefore=${dateTo}T23:59:59Z`;
  const r = await fetch(url);
  const j = await r.json();
  if (j.error) throw new Error(j.error.message);
  return j.items || [];
}

async function fetchVideoDetails(videoIds) {
  if (!videoIds.length) return {};
  const result = {};
  for (let i = 0; i < videoIds.length; i += 50) {
    const chunk = videoIds.slice(i, i+50);
    const url = `${API}/videos?part=contentDetails,statistics`
              + `&id=${chunk.join(",")}&key=${API_KEY}`;
    const r = await fetch(url);
    const j = await r.json();
    if (j.error) throw new Error(j.error.message);
    for (const it of (j.items || [])) {
      result[it.id] = {
        duration: it.contentDetails?.duration || "PT0S",
        viewCount: it.statistics?.viewCount || "0"
      };
    }
  }
  return result;
}

// ─── 검색 메인 ───
async function doSearch() {
  const keyword = $("keyword").value.trim();
  const dateFrom = $("dateFrom").value;
  const dateTo   = $("dateTo").value;
  const excludeShorts = $("excludeShorts").checked;
  const maxPer = Math.max(1, Math.min(50, parseInt($("maxPer").value) || 10));
  const out = $("results");

  if (!API_KEY)        { out.innerHTML = '<p class="err">secret.txt를 먼저 불러오세요.</p>'; $("settings").open=true; return; }
  if (!CHANNELS.length){ out.innerHTML = '<p class="err">channels.txt를 먼저 불러오세요.</p>'; $("settings").open=true; return; }
  if (!keyword)        { out.innerHTML = '<p class="err">키워드를 입력하세요.</p>'; return; }

  out.innerHTML = "<p>검색 중…</p>";
  $("infoBar").textContent = "";
  $("actions").classList.remove("show");

  const allItems = [];
  for (const ch of CHANNELS) {
    try {
      const id = await resolveChannelId(ch);
      if (!id) { allItems.push({ channel: ch, error: "채널을 찾을 수 없음" }); continue; }
      const vids = await searchChannel(id, keyword, maxPer, dateFrom, dateTo);
      if (!vids.length) { allItems.push({ channel: ch, empty: true }); continue; }
      for (const v of vids) {
        allItems.push({
          channel: ch,
          snippet: v.snippet,
          videoId: v.id.videoId
        });
      }
    } catch (e) {
      allItems.push({ channel: ch, error: e.message });
    }
  }

  const videoIds = allItems.filter(x => x.videoId).map(x => x.videoId);
  let details = {};
  try {
    details = await fetchVideoDetails(videoIds);
  } catch (e) {
    out.innerHTML = `<p class="err">영상 정보 조회 실패: ${e.message}</p>`;
    return;
  }

  // 결과 렌더링 + 평문 데이터 동시에 만들기
  const rows = [];     // HTML
  const plain = [];    // 텍스트 (공유/복사용)
  let idx = 1;

  for (const it of allItems) {
    if (it.error) {
      rows.push(`<div class="vrow err">${it.channel} → 오류: ${it.error}</div>`);
      plain.push(`${it.channel} → 오류: ${it.error}`);
      continue;
    }
    if (it.empty) {
      rows.push(`<div class="vrow">${it.channel} → 검색 결과 없음</div>`);
      plain.push(`${it.channel} → 검색 결과 없음`);
      continue;
    }

    const det = details[it.videoId] || {};
    const dur = parseDuration(det.duration || "PT0S");
    const isShorts = dur.sec > 0 && dur.sec <= 60;
    if (excludeShorts && isShorts) continue;

    const title = decode(it.snippet.title);
    const date  = it.snippet.publishedAt.slice(0,10);
    const views = fmtViews(det.viewCount);
    const url   = `https://www.youtube.com/watch?v=${it.videoId}`;
    const durTag = isShorts
      ? `<span class="shorts">[쇼츠 ${dur.str}]</span>`
      : `<span class="dur">[${dur.str}]</span>`;
    const durPlain = isShorts ? `[쇼츠 ${dur.str}]` : `[${dur.str}]`;

    rows.push(
      `<div class="vrow">#${idx} ${it.channel} ${durTag} `
      + `<a href="${url}" target="_blank">${title}</a> `
      + `<span class="meta">(조회 ${views}, ${date})</span></div>`
    );
    plain.push(
      `#${idx} ${it.channel} ${durPlain} ${title}\n`
      + `   ${url}\n`
      + `   (조회 ${views}, ${date})`
    );
    idx++;
  }

  const rendered = rows.join("") || "<p>결과 없음</p>";
  out.innerHTML = rendered;

  const now = new Date();
  const savedAt = `${fmtDate(now)} ${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;

  LAST_RESULT = {
    keyword, dateFrom, dateTo, savedAt,
    rendered,
    plain: plain.join("\n\n"),
    rangeLabel: (dateFrom || dateTo) ? `${dateFrom || "…"} ~ ${dateTo || "…"}` : "전체"
  };
  localStorage.setItem("yt_last_result", JSON.stringify(LAST_RESULT));
  pushHistory(LAST_RESULT);

  $("infoBar").textContent = `✓ "${keyword}" 검색 완료 — ${idx-1}건 (${savedAt})`;
  if (idx > 1 || rows.length > 0) $("actions").classList.add("show");
}

// ─── 다운로드 (HTML) ───
function downloadHTML() {
  if (!LAST_RESULT) { toast("결과가 없습니다"); return; }
  const r = LAST_RESULT;
  const html = `<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8">
<title>YouTube 검색 결과: ${r.keyword}</title>
<style>
  body{font-family:sans-serif;max-width:860px;margin:20px auto;padding:0 14px;
       background:#1a1a1a;color:#eee;line-height:1.7;}
  h1{font-size:1.2em;}
  .hdr{background:#222;padding:10px;border-radius:6px;margin-bottom:14px;}
  .vrow{padding:6px 0;border-bottom:1px dashed #444;font-family:Consolas,monospace;font-size:0.92em;}
  .vrow a{color:#ff7070;text-decoration:none;}
  .vrow .meta{color:#aaa;font-size:0.85em;}
  .vrow .dur{color:#ffd060;}
  .vrow .shorts{color:#7af;font-weight:bold;}
</style></head>
<body>
<h1>📺 YouTube 검색 결과</h1>
<div class="hdr">
  키워드: <b>${r.keyword}</b><br>
  기간: ${r.rangeLabel}<br>
  저장 시각: ${r.savedAt}
</div>
${r.rendered}
</body></html>`;

  const blob = new Blob([html], { type: "text/html;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const ts = r.savedAt.replace(/[: -]/g,"");
  a.href = url;
  a.download = `youtube_search_${ts}.html`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  toast("다운로드 시작");
}

// ─── 공유 (TXT) ───
async function shareText() {
  if (!LAST_RESULT) { toast("결과가 없습니다"); return; }
  const r = LAST_RESULT;
  const header = `[YouTube 검색: ${r.keyword} / ${r.rangeLabel}]\n저장: ${r.savedAt}\n\n`;
  const text = header + r.plain;

  if (navigator.share) {
    try {
      await navigator.share({ title: `YouTube 검색: ${r.keyword}`, text });
      return;
    } catch (e) {
      if (e.name === "AbortError") return; // 사용자가 취소
      // 실패 시 클립보드로 폴백
    }
  }
  // 폴백: 복사
  await writeClipboard(text);
  toast("공유 미지원 — 클립보드에 복사됨");
}

// ─── 복사 ───
async function copyText() {
  if (!LAST_RESULT) { toast("결과가 없습니다"); return; }
  const r = LAST_RESULT;
  const text = `[YouTube 검색: ${r.keyword} / ${r.rangeLabel}]\n저장: ${r.savedAt}\n\n` + r.plain;
  await writeClipboard(text);
  toast("클립보드에 복사됨");
}

async function writeClipboard(text) {
  // 최신 API 시도
  if (navigator.clipboard && window.isSecureContext) {
    try { await navigator.clipboard.writeText(text); return; } catch {}
  }
  // 폴백: textarea + execCommand
  const ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed"; ta.style.top = "-9999px";
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand("copy"); } catch {}
  document.body.removeChild(ta);
}

$("keyword").addEventListener("keydown", e => { if (e.key === "Enter") doSearch(); });

// 초기화
setRange(7);
restore();
</script>
